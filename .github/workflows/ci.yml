name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install
        run: pip install -e . && pip install ruff pytest
      - name: Lint
        run: ruff check . --select E,F,W --ignore E501
      - name: Tests
        run: pytest tests/ -v --tb=short || echo "no tests yet"
      - name: Smoke test
        run: |
          python analyzer.py . --output json | python -c "
          import sys, json
          data = json.load(sys.stdin)
          print(f'extracted {len(data.get(\"functions\", []))} functions')
          "
